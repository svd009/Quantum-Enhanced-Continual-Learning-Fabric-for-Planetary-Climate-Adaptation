$Utf8 = New-Object System.Text.UTF8Encoding $False
$content = @'
pinn:
  enabled: true
  pde_weight: 0.1
  architecture:
    hidden_dims: [64, 64, 32]
    activation: tanh
    fourier_features: true
    fourier_scale: 10.0
  physics:
    enforce_energy_conservation: true
    enforce_mass_conservation: true
    continuity_weight: 0.05
'@
[System.IO.File]::WriteAllText("$PWD\configs\pinn.yaml", $content, $Utf8)
echo "done"