$Utf8 = New-Object System.Text.UTF8Encoding $False
$content = @'
marl:
  enabled: true
  algorithm: ppo
  num_agents: 3
  obs_dim: 64
  action_dim: 16
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  n_steps: 2048
  reward:
    forecast_accuracy_weight: 0.6
    fairness_weight: 0.2
    energy_weight: 0.2
'@
[System.IO.File]::WriteAllText("$PWD\configs\marl.yaml", $content, $Utf8)
echo "done"